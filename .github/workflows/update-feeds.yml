name: Update Feeds and Push

# 触发方式：1.手动触发 2.每天定时触发（UTC 0点）
on:
  workflow_dispatch:  # 手动触发（关键，方便测试）
  schedule:
    - cron: '0 0 * * *'

# 赋予推送代码的权限
permissions:
  contents: write

jobs:
  update-and-push:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：拉取完整仓库代码（解决浅克隆问题）
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史
          ref: main       # 拉取main分支
          token: ${{ secrets.GITHUB_TOKEN }}

      # 步骤2：（可选）你的业务逻辑（比如生成/修改feeds文件）
      # 替换成你实际修改文件的命令，比如：
      # - name: Update feeds file
      #   run: |
      #     python generate_feeds.py  # 你的脚本命令
      #     # 或其他修改文件的操作

      # 步骤3：提交并推送（核心修复逻辑）
      - name: Commit and push feeds
        run: |
          # 配置Git用户
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 同步远程最新代码（保留本地修改）
          git fetch origin main
          git reset --soft origin/main
          
          # 添加修改的文件
          git add .
          
          # 仅当有变更时提交
          if git diff --cached --quiet; then
            echo "No changes to commit, exit"
            exit 0
          fi
          git commit -m "chore: update feeds [skip ci]"
          
          # 安全强制推送（解决同步冲突）
          git push origin main --force-with-lease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
