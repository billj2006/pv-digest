  name: Update Feeds and Push

  on:
    workflow_dispatch:
    schedule:
      - cron: '0 6 * * *'   # Daily at 6am UTC (2pm Beijing)

  permissions:
    contents: write

  concurrency:
    group: generate-feeds
    cancel-in-progress: false

  jobs:
    update-and-push:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout full repository
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
            ref: main
            token: ${{ secrets.GITHUB_TOKEN }}

        - uses: actions/setup-node@v4
          with:
            node-version: '22'

        - name: Install dependencies
          run: cd scripts && npm install

        - name: Generate feeds
          env:
            APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
            SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          run: cd scripts && node generate-feed.js 2>&1

        - name: Commit and push feeds
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add feed-x.json feed-podcasts.json state-feed.json
            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            git commit -m "chore: update feeds [skip ci]"
            git pull --rebase --autostash origin main
            git push origin main
