name: Generate PV Feeds

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC (2pm Beijing)
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "all" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }} 2>&1
          else
            cd scripts && node generate-feed.js 2>&1
          fi

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp feed-x.json /tmp/feed-x.json
          cp feed-podcasts.json /tmp/feed-podcasts.json
          cp state-feed.json /tmp/state-feed.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/feed-x.json feed-x.json
          cp /tmp/feed-podcasts.json feed-podcasts.json
          cp /tmp/state-feed.json state-feed.json
          git add feed-x.json feed-podcasts.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
