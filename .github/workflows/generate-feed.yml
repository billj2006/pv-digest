name: Generate PV Feeds

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC (2pm Beijing)
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - podcasts-only

concurrency:
  group: generate-feeds
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "all" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }} 2>&1
          else
            cd scripts && node generate-feed.js 2>&1
          fi

      - name: Commit and push feeds
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update feeds [skip ci]"
          file_pattern: "feed-x.json feed-podcasts.json state-feed.json"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
